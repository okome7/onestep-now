default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "password") %>

development:
  <<: *default
  database: onestep_now_development

test:
  <<: *default
  database: onestep_now_test
  url: <%= ENV["DATABASE_URL"] %>

production:
  <<: *default
  database: onestep_now_production
  url: <%= ENV["DATABASE_URL"] %>

staging:
  <<: *default
  database: onestep_now_staging
  url: <%= ENV["DATABASE_URL"] %>
