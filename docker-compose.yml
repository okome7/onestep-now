services:
  db:
    image: postgres:16
    container_name: onestep_now_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: onestep_now_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onestep_now_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: onestep_now_backend
    working_dir: /app
    command: >
      bash -c "rm -f tmp/pids/server.pid && bundle exec ruby bin/rails db:prepare && bundle exec ruby bin/rails s -b 0.0.0.0 -p 3000"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'ruby -r net/http -e ''response = Net::HTTP.get_response(URI("http://127.0.0.1:3000/up")); exit(response.is_a?(Net::HTTPSuccess) ? 0 : 1)''',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onestep_now_frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      API_BASE_URL: http://backend:3000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e ''fetch("http://127.0.0.1:5173").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))''',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: onestep_now_e2e
    working_dir: /workspace
    command: >
      bash -lc "npm ci && E2E_SKIP_WEBSERVER=1 BASE_URL=http://frontend:5173 E2E_BACKEND_URL=http://backend:3000 npx playwright test"
    volumes:
      - .:/workspace
    environment:
      CI: "true"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
